spring:
  datasource:
    url: jdbc:mysql://localhost:3306/likelion_market?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: 1234   # ← 본인 MySQL 비밀번호로 바꾸세요!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 앱 실행 시 테이블 자동 생성/수정
    show-sql: true       # SQL 쿼리를 콘솔에 출력 (공부할 때 유용!)
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: likelion-ku-backend-session-secret-key-2024-very-long-string
  expiration: 86400000   # 24시간 (밀리초)

server:
  port: 8080

logging:
  level:
    com.likelion: DEBUG   # 우리 코드 로그는 DEBUG 레벨까지 출력
